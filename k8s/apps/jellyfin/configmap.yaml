apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-configurator
  namespace: media
data:
  configure.sh: |
    #!/bin/sh

    JELLYFIN_URL="http://localhost:8096"

    echo "Waiting for Jellyfin to start..."
    until curl -sf "$JELLYFIN_URL/health" > /dev/null 2>&1; do
      sleep 5
    done

    echo "Checking Jellyfin state..."
    public_info=$(curl -s "$JELLYFIN_URL/System/Info/Public")
    echo "$public_info"
    wizard_done=$(echo "$public_info" | grep -o '"StartupWizardCompleted":true')

    if [ -n "$wizard_done" ]; then
      echo "Wizard already completed, checking users..."
      users=$(curl -s "$JELLYFIN_URL/Users/Public")
      echo "Users: $users"
      if echo "$users" | grep -q "admin"; then
        echo "Admin user exists, skipping wizard."
      else
        echo "No admin user found but wizard done. Manual setup needed."
      fi
      sleep infinity
    fi

    echo "Running startup wizard..."

    # Step 1: Set language/region
    echo "Step 1: Configuration..."
    curl -s -X POST "$JELLYFIN_URL/Startup/Configuration" \
      -H "Content-Type: application/json" \
      -d '{"UICulture":"en-US","MetadataCountryCode":"US","PreferredMetadataLanguage":"en"}'
    echo ""

    # Step 2: Wait for internal user to be created, then update it
    echo "Step 2: Waiting for initial user..."
    for i in $(seq 1 10); do
      startup_user=$(curl -s -X GET "$JELLYFIN_URL/Startup/User")
      echo "  GET /Startup/User (attempt $i): $startup_user"
      if echo "$startup_user" | grep -q "Name"; then
        break
      fi
      sleep 2
    done

    echo "Step 3: Setting admin user..."
    result=$(curl -s -w "\nHTTP:%{http_code}" -X POST "$JELLYFIN_URL/Startup/User" \
      -H "Content-Type: application/json" \
      -d '{"Name":"admin","Password":"admin"}')
    echo "  POST /Startup/User: $result"

    # Step 4: Complete wizard
    echo "Step 4: Completing wizard..."
    curl -s -X POST "$JELLYFIN_URL/Startup/Complete"
    echo ""

    sleep 3

    # Try to authenticate
    echo "Attempting auth as admin..."
    auth_result=$(curl -s -X POST "$JELLYFIN_URL/Users/AuthenticateByName" \
      -H "Content-Type: application/json" \
      -H 'X-Emby-Authorization: MediaBrowser Client="configure", Device="k8s", DeviceId="init", Version="1.0"' \
      -d '{"Username":"admin","Pw":"admin"}')
    echo "Auth result: $auth_result"

    token=$(echo "$auth_result" | grep -o '"AccessToken":"[^"]*"' | cut -d'"' -f4)
    if [ -z "$token" ]; then
      echo "Could not authenticate. Try logging in manually with admin / (empty password)."
      sleep infinity
    fi

    AUTH="X-Emby-Token: $token"

    # Add libraries
    existing=$(curl -s -H "$AUTH" "$JELLYFIN_URL/Library/VirtualFolders" 2>&1)
    if ! echo "$existing" | grep -q "TV Shows"; then
      echo "Adding TV Shows library..."
      curl -s -X POST "$JELLYFIN_URL/Library/VirtualFolders?name=TV%20Shows&collectionType=tvshows&refreshLibrary=false" \
        -H "$AUTH" -H "Content-Type: application/json" \
        -d '{"LibraryOptions":{"PathInfos":[{"Path":"/data/tv"}],"EnableRealtimeMonitor":true}}' || true
    fi
    if ! echo "$existing" | grep -q "Movies"; then
      echo "Adding Movies library..."
      curl -s -X POST "$JELLYFIN_URL/Library/VirtualFolders?name=Movies&collectionType=movies&refreshLibrary=false" \
        -H "$AUTH" -H "Content-Type: application/json" \
        -d '{"LibraryOptions":{"PathInfos":[{"Path":"/data/movies"}],"EnableRealtimeMonitor":true}}' || true
    fi

    echo "Jellyfin configuration complete!"
    sleep infinity
