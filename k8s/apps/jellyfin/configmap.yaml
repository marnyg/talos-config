apiVersion: v1
kind: ConfigMap
metadata:
  name: jellyfin-configurator
  namespace: media
data:
  configure.sh: |
    #!/bin/sh
    set -e

    JELLYFIN_URL="http://localhost:8096"

    echo "Waiting for Jellyfin to start..."
    until curl -sf "$JELLYFIN_URL/health" > /dev/null 2>&1; do
      sleep 5
    done

    # Complete startup wizard if needed
    wizard_done=$(curl -sf "$JELLYFIN_URL/System/Info/Public" | grep -o '"StartupWizardCompleted":[a-z]*' | cut -d: -f2)
    if [ "$wizard_done" != "true" ]; then
      echo "Completing startup wizard..."
      curl -sf -X POST "$JELLYFIN_URL/Startup/Configuration" \
        -H "Content-Type: application/json" \
        -d '{"UICulture":"en-US","MetadataCountryCode":"US","PreferredMetadataLanguage":"en"}' || true

      # Wait for initial user to appear
      for i in $(seq 1 10); do
        curl -sf "$JELLYFIN_URL/Startup/User" | grep -q "Name" && break
        sleep 2
      done

      curl -sf -X POST "$JELLYFIN_URL/Startup/User" \
        -H "Content-Type: application/json" \
        -d '{"Name":"admin","Password":"admin"}' || true

      curl -sf -X POST "$JELLYFIN_URL/Startup/Complete" || true
      echo "Wizard completed."
      sleep 3
    fi

    # Authenticate
    echo "Authenticating..."
    auth_result=$(curl -sf -X POST "$JELLYFIN_URL/Users/AuthenticateByName" \
      -H "Content-Type: application/json" \
      -H 'X-Emby-Authorization: MediaBrowser Client="configure", Device="k8s", DeviceId="init", Version="1.0"' \
      -d '{"Username":"admin","Pw":"admin"}' 2>/dev/null) || true

    token=$(echo "$auth_result" | grep -o '"AccessToken":"[^"]*"' | cut -d'"' -f4)
    if [ -z "$token" ]; then
      echo "WARN: Could not authenticate. Libraries must be added manually."
      sleep infinity
    fi

    AUTH="X-Emby-Token: $token"

    # Ensure libraries exist
    existing=$(curl -sf -H "$AUTH" "$JELLYFIN_URL/Library/VirtualFolders" 2>/dev/null)
    if ! echo "$existing" | grep -q "TV Shows"; then
      echo "Adding TV Shows library..."
      curl -sf -X POST "$JELLYFIN_URL/Library/VirtualFolders?name=TV%20Shows&collectionType=tvshows&refreshLibrary=true" \
        -H "$AUTH" -H "Content-Type: application/json" \
        -d '{"LibraryOptions":{"PathInfos":[{"Path":"/data/tv"}],"EnableRealtimeMonitor":true}}' || echo "WARN: TV library failed"
    fi
    if ! echo "$existing" | grep -q "Movies"; then
      echo "Adding Movies library..."
      curl -sf -X POST "$JELLYFIN_URL/Library/VirtualFolders?name=Movies&collectionType=movies&refreshLibrary=true" \
        -H "$AUTH" -H "Content-Type: application/json" \
        -d '{"LibraryOptions":{"PathInfos":[{"Path":"/data/movies"}],"EnableRealtimeMonitor":true}}' || echo "WARN: Movies library failed"
    fi

    echo "Jellyfin configuration complete!"
    sleep infinity
