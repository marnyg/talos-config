apiVersion: v1
kind: ConfigMap
metadata:
  name: sonarr-configurator
  namespace: media
data:
  configure.sh: |
    #!/bin/sh
    set -e

    SONARR_URL="http://localhost:8989"
    JACKETT_API_KEY="d47e09ac8e5d4c7f85b13a2f6e9c3d1a"

    echo "Waiting for Sonarr to start..."
    until curl -sf "$SONARR_URL/ping" > /dev/null 2>&1; do
      sleep 5
    done

    # Wait for config.xml to have an API key
    while [ ! -f /config/config.xml ] || ! grep -q '<ApiKey>' /config/config.xml; do
      sleep 2
    done

    API_KEY=$(sed -n 's/.*<ApiKey>\(.*\)<\/ApiKey>.*/\1/p' /config/config.xml)
    echo "Sonarr API key: $API_KEY"
    AUTH="X-Api-Key: $API_KEY"

    # Wait for dependency services
    echo "Waiting for NZBget..."
    until curl -sf "http://nzbget:6789" > /dev/null 2>&1; do sleep 5; done

    echo "Waiting for Transmission..."
    until curl -sf "http://transmission:9091/transmission/web/" > /dev/null 2>&1; do sleep 5; done

    echo "Waiting for Jackett..."
    until curl -sf "http://jackett:9117" > /dev/null 2>&1; do sleep 5; done

    # Add root folder /tv
    existing=$(curl -sf -H "$AUTH" "$SONARR_URL/api/v3/rootfolder")
    if ! echo "$existing" | grep -q "/tv"; then
      echo "Adding root folder /tv..."
      curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" \
        -d '{"path":"/tv"}' "$SONARR_URL/api/v3/rootfolder" || echo "WARN: root folder failed"
    fi

    # Add NZBget download client
    existing=$(curl -sf -H "$AUTH" "$SONARR_URL/api/v3/downloadclient")
    if ! echo "$existing" | grep -q "NZBget"; then
      echo "Adding NZBget download client..."
      curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{
        "enable": true,
        "protocol": "usenet",
        "priority": 1,
        "name": "NZBget",
        "implementation": "Nzbget",
        "configContract": "NzbgetSettings",
        "fields": [
          {"name": "host", "value": "nzbget"},
          {"name": "port", "value": 6789},
          {"name": "username", "value": ""},
          {"name": "password", "value": ""},
          {"name": "tvCategory", "value": "Series"},
          {"name": "useSsl", "value": false}
        ]
      }' "$SONARR_URL/api/v3/downloadclient" || echo "WARN: NZBget client failed"
    fi

    # Add Transmission download client
    if ! echo "$existing" | grep -q "Transmission"; then
      echo "Adding Transmission download client..."
      curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{
        "enable": true,
        "protocol": "torrent",
        "priority": 1,
        "name": "Transmission",
        "implementation": "Transmission",
        "configContract": "TransmissionSettings",
        "fields": [
          {"name": "host", "value": "transmission"},
          {"name": "port", "value": 9091},
          {"name": "useSsl", "value": false}
        ]
      }' "$SONARR_URL/api/v3/downloadclient" || echo "WARN: Transmission client failed"
    fi

    # Add Jackett indexer (Torznab)
    existing=$(curl -sf -H "$AUTH" "$SONARR_URL/api/v3/indexer")
    if ! echo "$existing" | grep -q "Jackett"; then
      echo "Adding Jackett indexer..."
      curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{
        "enableRss": false,
        "enableAutomaticSearch": true,
        "enableInteractiveSearch": true,
        "protocol": "torrent",
        "priority": 25,
        "name": "Jackett",
        "implementation": "Torznab",
        "configContract": "TorznabSettings",
        "fields": [
          {"name": "baseUrl", "value": "http://jackett:9117/api/v2.0/indexers/all/results/torznab/"},
          {"name": "apiPath", "value": "/api"},
          {"name": "apiKey", "value": "'"$JACKETT_API_KEY"'"},
          {"name": "minimumSeeders", "value": 1}
        ]
      }' "$SONARR_URL/api/v3/indexer" || echo "WARN: Jackett indexer failed"
    fi

    # Add NZBgeek indexer (Newznab/usenet)
    if [ -n "$NZBGEEK_API_KEY" ] && ! echo "$existing" | grep -q "NZBgeek"; then
      echo "Adding NZBgeek indexer..."
      curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{
        "enableRss": true,
        "enableAutomaticSearch": true,
        "enableInteractiveSearch": true,
        "protocol": "usenet",
        "priority": 10,
        "name": "NZBgeek",
        "implementation": "Newznab",
        "configContract": "NewznabSettings",
        "fields": [
          {"name": "baseUrl", "value": "https://api.nzbgeek.info"},
          {"name": "apiPath", "value": "/api"},
          {"name": "apiKey", "value": "'"$NZBGEEK_API_KEY"'"},
          {"name": "categories", "value": [5030, 5040]},
          {"name": "animeCategories", "value": [5070]}
        ]
      }' "$SONARR_URL/api/v3/indexer" || echo "WARN: NZBgeek indexer failed"
    fi

    # Configure Trakt import list (watchlist)
    existing_lists=$(curl -sf -H "$AUTH" "$SONARR_URL/api/v3/importlist")
    if [ -n "$TRAKT_ACCESS_TOKEN" ] && ! echo "$existing_lists" | grep -q "Trakt"; then
      echo "Adding Trakt watchlist import list..."
      qp_id=$(curl -sf -H "$AUTH" "$SONARR_URL/api/v3/qualityprofile" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
      curl -sf -X POST -H "$AUTH" -H "Content-Type: application/json" -d '{
        "enabled": true,
        "enableAutomaticAdd": true,
        "searchForMissingEpisodes": true,
        "shouldMonitor": "all",
        "rootFolderPath": "/tv",
        "qualityProfileId": '"$qp_id"',
        "name": "Trakt Watchlist",
        "implementation": "TraktListImport",
        "configContract": "TraktListSettings",
        "fields": [
          {"name": "accessToken", "value": "'"$TRAKT_ACCESS_TOKEN"'"},
          {"name": "refreshToken", "value": "'"$TRAKT_REFRESH_TOKEN"'"},
          {"name": "expires", "value": ""},
          {"name": "authUser", "value": ""},
          {"name": "traktListType", "value": 0},
          {"name": "username", "value": ""},
          {"name": "listname", "value": ""},
          {"name": "rating", "value": "0-100"},
          {"name": "certification", "value": "NR,G,PG,PG-13,R,NC-17"},
          {"name": "genres", "value": ""},
          {"name": "years", "value": ""},
          {"name": "limit", "value": 100},
          {"name": "traktAdditionalParameters", "value": ""},
          {"name": "signIn", "value": "startOAuth"}
        ]
      }' "$SONARR_URL/api/v3/importlist" > /dev/null && echo "  OK" || echo "  WARN: Trakt import list failed"
    fi

    echo "Sonarr configuration complete!"
    sleep infinity
