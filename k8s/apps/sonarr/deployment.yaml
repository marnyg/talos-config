apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      initContainers:
        - name: config
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              cat > /config/config.xml << 'XMLEOF'
              <Config>
                <Port>8989</Port>
                <BindAddress>*</BindAddress>
                <AuthenticationMethod>External</AuthenticationMethod>
                <AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>
              </Config>
              XMLEOF
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: sonarr
          image: ghcr.io/linuxserver/sonarr:4.0.17
          ports:
            - containerPort: 8989
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: tv
              mountPath: /tv
            - name: downloads
              mountPath: /downloads
          readinessProbe:
            httpGet:
              path: /ping
              port: 8989
            initialDelaySeconds: 15
            periodSeconds: 10
        - name: configurator
          image: alpine:3.21
          command: ["/bin/sh", "-c"]
          args:
            - apk add --no-cache curl > /dev/null 2>&1 && sh /scripts/configure.sh
          volumeMounts:
            - name: config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: config
          emptyDir: {}
        - name: scripts
          configMap:
            name: sonarr-configurator
        - name: tv
          persistentVolumeClaim:
            claimName: media-tv
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: sonarr
  namespace: media
spec:
  type: NodePort
  selector:
    app: sonarr
  ports:
    - port: 8989
      targetPort: 8989
      nodePort: 30989
