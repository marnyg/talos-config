apiVersion: apps/v1
kind: Deployment
metadata:
  name: jackett
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jackett
  template:
    metadata:
      labels:
        app: jackett
    spec:
      initContainers:
        - name: config
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              mkdir -p /config/Jackett
              cp /template/ServerConfig.json /config/Jackett/ServerConfig.json
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-template
              mountPath: /template
      containers:
        - name: jackett
          image: ghcr.io/linuxserver/jackett:0.24.1
          ports:
            - containerPort: 9117
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: AUTO_UPDATE
              value: "false"
          volumeMounts:
            - name: config
              mountPath: /config
          readinessProbe:
            httpGet:
              path: /UI/Dashboard
              port: 9117
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: config
          emptyDir: {}
        - name: config-template
          configMap:
            name: jackett-config
---
apiVersion: v1
kind: Service
metadata:
  name: jackett
  namespace: media
spec:
  selector:
    app: jackett
  ports:
    - port: 9117
      targetPort: 9117
