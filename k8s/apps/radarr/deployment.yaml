apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      initContainers:
        - name: config
          image: busybox:1.37
          command: ["sh", "-c"]
          args:
            - |
              cat > /config/config.xml << 'XMLEOF'
              <Config>
                <Port>7878</Port>
                <BindAddress>*</BindAddress>
                <AuthenticationMethod>External</AuthenticationMethod>
                <AuthenticationRequired>DisabledForLocalAddresses</AuthenticationRequired>
              </Config>
              XMLEOF
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: radarr
          image: lscr.io/linuxserver/radarr:6.0.4
          ports:
            - containerPort: 7878
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          volumeMounts:
            - name: config
              mountPath: /config
            - name: movies
              mountPath: /movies
            - name: downloads
              mountPath: /downloads
          readinessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 15
            periodSeconds: 10
        - name: configurator
          image: alpine:3.21
          command: ["/bin/sh", "-c"]
          args:
            - apk add --no-cache curl > /dev/null 2>&1 && sh /scripts/configure.sh
          volumeMounts:
            - name: config
              mountPath: /config
            - name: scripts
              mountPath: /scripts
      volumes:
        - name: config
          emptyDir: {}
        - name: scripts
          configMap:
            name: radarr-configurator
        - name: movies
          persistentVolumeClaim:
            claimName: media-movies
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads
---
apiVersion: v1
kind: Service
metadata:
  name: radarr
  namespace: media
spec:
  type: NodePort
  selector:
    app: radarr
  ports:
    - port: 7878
      targetPort: 7878
      nodePort: 30878
