machine:
    install:
        disk: /dev/mmcblk0 # The disk used for installations.
        #image: ghcr.io/siderolabs/installer:v1.11.0-alpha.0 # Allows for supplying the image used to perform the installation.
        #image: factory.talos.dev/installer/ee21ef4a5ef808a9b7484cc0dda0f25075021691c8c09a276591eedb638ea1f9:v1.10.0
    network:
       hostname: rpi
       interfaces:
           - interface: end0
             # Assigns static IP addresses to the interface.
             addresses:
                 - 10.0.0.5/24
             routes:
                 - network: 0.0.0.0/0 # The route's network (destination).
                   gateway: 10.0.0.1 # The route's gateway (if empty, creates link scope route).
             mtu: 1500 # The interface's MTU.
cluster:
    clusterName: rpi # Configures the cluster's name.
    controlPlane:
        endpoint: https://10.0.0.5:6443
    apiServer:
        certSANs:
            - 10.0.0.5

